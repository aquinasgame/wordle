<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aquinas Wordle</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #fff;
    color: #fff;
    margin: 0;
    padding: 0;
  }

  #game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding-bottom: 20px;
  }

  h1 {
    display: inline-block;
    background: #dc0c0c;
    padding: 12px 24px;
    border-radius: 12px;
    margin-top: 20px;
    font-size: 2em;
  }

  #board {
    display: grid;
    grid-template-rows: repeat(6, 1fr);
    gap: 4px;
    width: 90%;
    max-width: 300px;
    margin: 20px auto;
  }

  .row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
  }

  .tile {
    width: 100%;
    aspect-ratio: 1 / 1;
    border: 2px solid #000000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8em;
    text-transform: uppercase;
    background: #cccccc;
  }

  .correct { background: #538d4e; color: white; }
  .present { background: #b59f3b; color: white; }
  .absent  { background: #787c7e; color: white; }

  #keyboard {
    width: 95%;
    max-width: 400px;
    margin-top: 20px;
    display: grid;
    gap: 6px;
  }

  .key-row {
    display: grid;
    gap: 4px;
  }

  .key-row.first { grid-template-columns: repeat(10, 1fr); }
  .key-row.second { grid-template-columns: 0.5fr repeat(9, 1fr) 0.5fr; }
  .key-row.third { grid-template-columns: 1fr repeat(7, 1fr) 1fr; }

  button.key {
    padding: 10px;
    font-size: 1em;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #cccccc;
    color: white;
    width: 100%;
    box-sizing: border-box;
    text-transform: uppercase;
  }

  button.key.wide {
    font-size: 0.9em;
    padding: 10px 5px;
  }

  #message {
    margin-top: 10px;
    font-size: 1.2em;
    min-height: 1.5em;
    border: none;
    border-radius: 8px;
    background: #cccccc;
    color: white;
    cursor: pointer;
    display: none;
  }

  #retry-btn {
    margin-top: 15px;
    padding: 10px 20px;
    font-size: 1em;
    border: none;
    border-radius: 8px;
    background: #538d4e;
    color: white;
    cursor: pointer;
    display: none;
  }

  #score {
    margin-top: 10px;
    font-size: 1.1em;
  }

  @media (max-width: 400px) {
    h1 { font-size: 1.5em; }
    .tile { font-size: 1.5em; }
    button.key { font-size: 0.9em; padding: 8px; }
    #retry-btn { font-size: 0.9em; padding: 8px 16px; }
  }
</style>
</head>
<body>

<div id="game-container">
  <h1>Aquinas Wordle</h1>
  <div id="board"></div>
  <div id="keyboard"></div>
  <p id="message"></p>
  <button id="retry-btn">Retry</button>
  <p id="score">Score: 0</p>
</div>

<script>
let words = ["birds","exams","books","reads","smart","puppy","pizza","halls","manga","sleep"];
let validWords = [];
let answer = "";
let currentRow = 0;
let currentGuess = "";
let score = 0;

const board = document.getElementById("board");
const keyboard = document.getElementById("keyboard");
const message = document.getElementById("message");
const retryBtn = document.getElementById("retry-btn");
const scoreDisplay = document.getElementById("score");

// Load external word list if present
fetch("words.txt")
  .then(res => res.text())
  .then(text => {
    validWords = text.split("\n").map(w => w.trim().toLowerCase());
    startGame();
  })
  .catch(err => {
    console.log("Error loading words.txt, using default:", err);
    validWords = [...words];
    startGame();
  });

function startGame() {
  answer = words[Math.floor(Math.random() * words.length)];
  currentRow = 0;
  currentGuess = "";
  message.textContent = "";
  retryBtn.style.display = "none";

  // Clear board
  board.innerHTML = "";
  for(let i=0;i<6;i++){
    const row = document.createElement("div");
    row.className = "row";
    for(let j=0;j<5;j++){
      const tile = document.createElement("div");
      tile.className = "tile";
      row.appendChild(tile);
    }
    board.appendChild(row);
  }

  // Create keyboard if not already
  if(keyboard.children.length===0){
    const layout = [
      ["Q","W","E","R","T","Y","U","I","O","P"],
      ["A","S","D","F","G","H","J","K","L"],
      ["ENTER","Z","X","C","V","B","N","M","⌫"]
    ];
    layout.forEach((rowKeys,i)=>{
      const rowDiv = document.createElement("div");
      rowDiv.className = "key-row";
      if(i===0) rowDiv.classList.add("first");
      if(i===1) rowDiv.classList.add("second");
      if(i===2) rowDiv.classList.add("third");
      rowKeys.forEach(key=>{
        const btn = document.createElement("button");
        btn.textContent = key;
        btn.className = "key";
        if(key==="ENTER"||key==="⌫") btn.classList.add("wide");
        btn.onclick = ()=>handleKey(key);
        rowDiv.appendChild(btn);
      });
      keyboard.appendChild(rowDiv);
    });
  }

  // Reset keyboard colors
  document.querySelectorAll("button.key").forEach(btn=>{
    btn.style.background="#cccccc";
    btn.style.color="white";
  });
}

function handleKey(key){
  if(currentRow>=6) return;
  if(key==="ENTER"){ submitGuess(); return; }
  if(key==="⌫"){ currentGuess=currentGuess.slice(0,-1); updateTiles(); return; }
  if(currentGuess.length<5 && /^[a-zA-Z]$/.test(key)){ currentGuess+=key.toLowerCase(); updateTiles(); }
}

function updateTiles(){
  const row = board.children[currentRow].children;
  for(let i=0;i<5;i++) row[i].textContent=currentGuess[i]||"";
}

function submitGuess(){
  if(currentGuess.length!==5){ message.textContent="Enter 5 letters"; return; }
  if(!validWords.includes(currentGuess)){ message.textContent="Not a valid word"; return; }

  const row = board.children[currentRow].children;
  for(let i=0;i<5;i++){
    const letter=currentGuess[i];
    const tile=row[i];
    if(letter===answer[i]){ tile.classList.add("correct"); colorKey(letter,"correct"); }
    else if(answer.includes(letter)){ tile.classList.add("present"); colorKey(letter,"present"); }
    else{ tile.classList.add("absent"); colorKey(letter,"absent"); }
  }

  if(currentGuess===answer){
    message.textContent="You win!";
    score++;
    retryBtn.style.display="inline-block";
    updateScore();
    currentRow=6;
    return;
  }

  currentRow++;
  currentGuess="";
  if(currentRow===6){
    message.textContent="Game over! Word was: "+answer;
    score=0; // reset consecutive wins
    retryBtn.style.display="inline-block";
    updateScore();
  }
}

function colorKey(letter,status){
  document.querySelectorAll("button.key").forEach(btn=>{
    if(btn.textContent.toLowerCase()===letter){
      btn.style.background=status==="correct"?"#538d4e":status==="present"?"#b59f3b":"#787c7e";
      btn.style.color="white";
    }
  });
}

function updateScore(){ scoreDisplay.textContent="Score: "+score; }

retryBtn.onclick = () => startGame();

// Physical keyboard support
document.addEventListener("keydown", e=>{
  if(e.key==="Enter") handleKey("ENTER");
  else if(e.key==="Backspace") handleKey("⌫");
  else if(/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
});
</script>
</body>
</html>
