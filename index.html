<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Custom Wordle</title>
<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #ffffff;
    color: #000;
    margin: 0;
    padding: 0;
  }

  h1 {
    display: inline-block;
    background: #eaeaea;
    padding: 12px 24px;
    border-radius: 12px;
    margin-top: 20px;
    font-size: 2em;
  }

  #board {
    display: grid;
    grid-template-rows: repeat(6, 1fr);
    gap: 6px;
    width: 90%;
    max-width: 350px;
    margin: 20px auto;
  }

  .row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
  }

  .tile {
    width: 100%;
    aspect-ratio: 1 / 1;
    border: 2px solid #ccc;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2em;
    text-transform: uppercase;
    background: #fff;
  }

  .correct { background: #538d4e; color: white; }
  .present { background: #b59f3b; color: white; }
  .absent  { background: #787c7e; color: white; }

  #keyboard {
    width: 95%;
    max-width: 400px;
    margin: 20px auto;
    display: grid;
    gap: 6px;
  }

  .key-row {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 4px;
  }

  .key-row.short { grid-template-columns: 0.5fr repeat(9, 1fr) 0.5fr; } /* middle row */
  .key-row.last { grid-template-columns: 1fr repeat(7, 1fr) 1fr; } /* bottom row with ENTER & ⌫ */

  button.key {
    padding: 10px;
    font-size: 1em;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #d3d6da;
    color: black;
    width: 100%;
    box-sizing: border-box;
    text-transform: uppercase;
  }

  button.key.wide {
    font-size: 0.9em;
    padding: 10px 5px;
  }

  #message {
    margin-top: 10px;
    font-size: 1.2em;
    min-height: 1.5em;
  }

  @media (max-width: 400px) {
    h1 { font-size: 1.5em; }
    .tile { font-size: 1.5em; }
    button.key { font-size: 0.9em; padding: 8px; }
  }
</style>
</head>
<body>

<h1>Wordle Clone</h1>
<div id="board"></div>
<div id="keyboard"></div>
<p id="message"></p>

<script>
  const words = ["apple", "grape", "stone", "plant", "chair", "light", "world", "brain", "candy", "fruit"];
  const validWords = [...words, "shiny", "table", "water", "money"]; // add more as desired
  const answer = words[Math.floor(Math.random() * words.length)];

  let currentRow = 0;
  let currentGuess = "";

  const board = document.getElementById("board");
  const keyboard = document.getElementById("keyboard");
  const message = document.getElementById("message");

  // create board
  for (let i = 0; i < 6; i++) {
    const row = document.createElement("div");
    row.className = "row";
    for (let j = 0; j < 5; j++) {
      const tile = document.createElement("div");
      tile.className = "tile";
      row.appendChild(tile);
    }
    board.appendChild(row);
  }

  // keyboard layout
  const layout = [
    ["Q","W","E","R","T","Y","U","I","O","P"],
    ["A","S","D","F","G","H","J","K","L"],
    ["ENTER","Z","X","C","V","B","N","M","⌫"]
  ];

  layout.forEach((row, i) => {
    const rowDiv = document.createElement("div");
    rowDiv.className = "key-row";

    if (i === 1) rowDiv.classList.add("short");
    if (i === 2) rowDiv.classList.add("last");

    row.forEach(key => {
      const button = document.createElement("button");
      button.textContent = key;
      button.className = "key";
      if (key === "ENTER" || key === "⌫") button.classList.add("wide");
      button.onclick = () => handleKey(key);
      rowDiv.appendChild(button);
    });

    keyboard.appendChild(rowDiv);
  });

  function handleKey(key) {
    if (currentRow >= 6) return;

    if (key === "ENTER") { submitGuess(); return; }
    if (key === "⌫") { currentGuess = currentGuess.slice(0,-1); updateTiles(); return; }

    if (currentGuess.length < 5 && /^[a-zA-Z]$/.test(key)) {
      currentGuess += key.toLowerCase();
      updateTiles();
    }
  }

  function updateTiles() {
    const row = board.children[currentRow].children;
    for (let i = 0; i < 5; i++) {
      row[i].textContent = currentGuess[i] || "";
    }
  }

  function submitGuess() {
    if (currentGuess.length !== 5) { message.textContent = "Enter 5 letters"; return; }
    if (!validWords.includes(currentGuess)) { message.textContent = "Not a valid word"; return; }

    const row = board.children[currentRow].children;
    for (let i = 0; i < 5; i++) {
      const letter = currentGuess[i];
      const tile = row[i];

      if (letter === answer[i]) { tile.classList.add("correct"); colorKey(letter,"correct"); }
      else if (answer.includes(letter)) { tile.classList.add("present"); colorKey(letter,"present"); }
      else { tile.classList.add("absent"); colorKey(letter,"absent"); }
    }

    if (currentGuess === answer) { message.textContent = "You win!"; currentRow = 6; return; }

    currentRow++;
    currentGuess = "";

    if (currentRow === 6) message.textContent = "Game over! Word was: " + answer;
  }

  function colorKey(letter, status) {
    document.querySelectorAll("button.key").forEach(btn => {
      if (btn.textContent.toLowerCase() === letter) {
        btn.style.background = status === "correct" ? "#538d4e" : status === "present" ? "#b59f3b" : "#787c7e";
        btn.style.color = "white";
      }
    });
  }

  // Physical keyboard support
  document.addEventListener("keydown", (e) => {
    if (e.key === "Enter") handleKey("ENTER");
    else if (e.key === "Backspace") handleKey("⌫");
    else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
  });
</script>
</body>
</html>
